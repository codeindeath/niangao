<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>方案C — 极简下划线</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.phone { width: 375px; height: 812px; background: #faf8f5; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.status-bar { height: 47px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; font-size: 12px; color: #1a1a1a; font-weight: 600; }

/* 🌟 Minimal underline tabs */
.tab-underline {
  display: flex; justify-content: space-around; align-items: center;
  padding: 8px 0 4px; border-bottom: 1px solid #f0ece7;
  position: sticky; top: 0; z-index: 20;
  background: rgba(250,248,245,0.95);
  backdrop-filter: blur(10px);
}
.tab-u {
  font-size: 15px; font-weight: 500; color: #b5b0a8;
  padding: 6px 0 10px; cursor: pointer; transition: 0.2s;
  flex: 1; text-align: center; position: relative;
}
.tab-u.active { color: #1a1a1a; font-weight: 700; }
.tab-u.active::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 3px; background: #4a7c59; border-radius: 2px;
  transition: 0.2s;
}
/* Subtle count badge */
.tab-count { font-size: 10px; color: #b5b0a8; font-weight: 400; margin-left: 2px; }
.tab-u.active .tab-count { color: #4a7c59; }

.card {
  height: calc(812px - 47px - 80px - 44px);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 32px; border-bottom: 1px solid #f0ece7;
}
.card-quote { font-size: 72px; color: #4a7c59; opacity: 0.08; font-family: Georgia; line-height: 1; margin-bottom: -16px; }
.card-content { font-size: 26px; font-weight: 700; line-height: 40px; color: #1a1a1a; text-align: center; margin-bottom: 24px; }
.card-divider { width: 40px; height: 2px; background: #d4e0d6; margin-bottom: 20px; }
.creator { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.creator-avatar { width: 32px; height: 32px; border-radius: 16px; background: #eaf2e8; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #4a7c59; }
.creator-name { font-size: 14px; font-weight: 600; color: #4a4a4a; }
.creator-title { font-size: 11px; color: #4a7c59; font-weight: 500; }
.stars { font-size: 16px; color: #e8a850; letter-spacing: 2px; margin-top: 6px; }
.actions { position: absolute; bottom: 140px; left: 0; right: 0; display: flex; justify-content: center; gap: 12px; }
.pill { padding: 8px 16px; border-radius: 20px; background: #fff; border: 0.5px solid #f0ece7; font-size: 13px; color: #9a9a9a; cursor: pointer; }
.btm-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: #faf8f5; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; border-top: 0.5px solid #f0ece7; }
.btm-item { font-size: 11px; color: #b5b0a8; text-align: center; }
.btm-item.active { color: #4a7c59; font-weight: 600; }
.notes { position: absolute; bottom: 96px; left: 16px; font-size: 10px; color: #b5b0a8; background: rgba(250,248,245,0.9); padding: 2px 8px; border-radius: 4px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">9:41</div>
  <div class="tab-underline">
    <span class="tab-u active">推荐</span>
    <span class="tab-u">我的<span class="tab-count">12</span></span>
    <span class="tab-u">收藏<span class="tab-count">8</span></span>
  </div>
  <div class="card">
    <div class="card-quote">"</div>
    <div class="card-content">每天花 15 分钟写复盘日记，三个月后你会感谢自己</div>
    <div class="card-divider"></div>
    <div class="creator">
      <div class="creator-avatar">陈</div>
      <div>
        <div class="creator-name">陈思远</div>
        <div class="creator-title">复盘教练</div>
      </div>
    </div>
    <div class="stars">★★★★☆</div>
    <div class="actions">
      <span class="pill">♥ 点赞</span>
      <span class="pill">★ 收藏</span>
    </div>
  </div>
  <div class="btm-bar">
    <span class="btm-item active">🏠<br>首页</span>
    <span class="btm-item">✚<br>发布</span>
    <span class="btm-item">💬<br>AI对话</span>
    <span class="btm-item">👤<br>我的</span>
  </div>
  <div class="notes">ⓘ 方案C：极简下划线 — 均分宽度，底部绿色短下划线指示，可选数量角标</div>
</div>
</body>
</html>
