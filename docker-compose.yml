# 年糕 App — Docker Compose 一键部署
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-service
    ports:
      - "8000:8000"
    env_file:
      - .env

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: niangao
      POSTGRES_USER: niangao
      POSTGRES_PASSWORD: ${DB_PASSWORD:-niangao}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niangao"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
