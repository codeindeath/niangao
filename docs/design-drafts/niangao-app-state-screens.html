<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>年糕 App 状态和子页面设计稿</title>
<style>
*{box-sizing:border-box}
:root{

}
html,body{margin:0;min-height:100%;font-family:var(--font);background:radial-gradient(circle at 14% -8%,#fafffb 0,#edf7f1 38%,#e5eee9 100%);color:var(--ink)}
body{padding:28px}
svg{stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.svg-defs{position:absolute;width:0;height:0;overflow:hidden}
.page{max-width:1780px;margin:0 auto}

.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}

.icon{width:20px;height:20px;stroke-width:1.85}

.search-fab{position:absolute;right:19px;top:55px;z-index:5}

.danger{color:var(--rose)!important}
.feed-card{position:relative;height:570px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.capsule{position:absolute;top:4px;left:50%;transform:translateX(-50%);height:30px;border-radius:10px;padding:0 13px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:850;white-space:nowrap;background:rgba(255,255,255,.78);border:1px solid rgba(210,228,218,.9);box-shadow:0 10px 28px rgba(35,122,98,.09);color:var(--jade)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}

.star{width:13px;height:13px;stroke-width:1.6;fill:currentColor}

.quote-mark{font-family:Georgia,serif;font-size:76px;line-height:58px;margin-bottom:-8px;color:rgba(35,122,98,.1)}
.hero-text{font-size:26px;line-height:1.55;font-weight:950;letter-spacing:0;max-width:315px}
.topic{margin-top:18px;height:28px;border-radius:9px;padding:0 13px;display:inline-flex;align-items:center;font-size:12px;font-weight:850;background:#eaf4ef;color:#28745e}

.action{height:38px;border-radius:10px;padding:0 16px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:950;border:1px solid transparent}

.action.saved{background:#f4f7fb;border-color:#d7e3ec;color:var(--blue)}

.back-card{padding-top:10px}

.interpret{border-radius:12px;background:#f8fcfa;border:1px solid #dce9e1;padding:12px;text-align:left}

.list-head{display:flex;align-items:center;gap:8px;height:42px;border-radius:12px;background:#fff;border:1px solid #dce9e1;padding:0 12px;color:#87968f;font-size:13px;font-weight:850}
.list{display:grid;gap:9px;margin-top:11px}
.list-card{border:1px solid #dce9e1;border-radius:13px;background:#fff;padding:12px}
.list-card strong{font-size:14px;line-height:1.45}.list-meta{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:10px;color:#7c8b84;font-weight:850}

.unavailable h4{font-size:18px;color:#263e35;margin:0}.unavailable p{font-size:13px;line-height:1.6;margin:8px auto 0;max-width:240px}
.skeleton{display:grid;gap:13px;padding-top:18px}.sk{border-radius:12px;background:linear-gradient(90deg,#edf5f1,#f8fcfa,#edf5f1);background-size:220% 100%;height:18px}.sk.big{height:245px}.sk.mid{height:78px}.sk.small{width:70%}
.search-top{height:54px;display:flex;align-items:center;gap:10px}
.search-box{height:40px;flex:1;border-radius:12px;border:1px solid #dce9e1;background:#fff;display:flex;align-items:center;gap:8px;padding:0 12px;color:#334940;font-size:13px;font-weight:850;box-shadow:0 8px 18px rgba(25,72,58,.05)}
.result-count{font-size:12px;color:#819089;font-weight:850;margin:4px 2px 8px}
.note-area{height:100%;display:flex;flex-direction:column}
.note-top{height:56px;display:flex;align-items:center;justify-content:space-between}
.note-cancel,.note-save{font-size:15px;font-weight:850}.note-cancel{color:#829089}.note-save{color:var(--jade)}
.note-title{font-size:15px;color:#98a49e;font-weight:880}
.textarea-zone{height:286px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:12px}
.big-input{width:100%;height:150px;border:0;outline:0;resize:none;background:transparent;text-align:center;font-family:inherit;font-size:20px;line-height:1.65;font-weight:780;color:var(--ink)}
.placeholder{color:#b4c0ba}
.count{font-size:12px;color:#b6c0bb;margin-top:7px}
.rewrite{height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;padding:0 14px;font-size:12px;font-weight:880;color:#526861;margin-top:10px;box-shadow:0 8px 18px rgba(25,72,58,.06)}
.field-label{text-align:center;font-size:11px;color:#9da9a3;font-weight:880;margin:7px 0 1px}
.dash{text-align:center;color:#d3ded8;font-size:13px;margin-bottom:7px}
.domain-row,.sub-row{display:flex;justify-content:center;gap:13px;flex-wrap:wrap;padding:0 8px}
.domain,.sub{font-size:13px;font-weight:780;color:#87968f}
.domain.active,.sub.active{font-size:15px;font-weight:950;color:var(--jade)}
.domain.dim,.sub.dim{color:#c0cbc5}
.sub-wrap{min-height:34px;margin-top:8px}
.topic-zone{margin-top:20px;text-align:center}
.topic-text{font-size:13px;font-weight:850;color:#708079}
.save-zone{margin-top:auto;padding-bottom:22px}
.save-main{height:48px;border-radius:11px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--jade),#1f6754);font-size:16px;font-weight:950;box-shadow:0 14px 25px rgba(35,122,98,.23)}
.privacy{height:28px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;color:#98a49e;font-weight:780}
.privacy::before{content:"";width:5px;height:5px;border-radius:50%;background:#d3ded8}
.chat-area{height:100%;position:relative}
.chat-head{height:66px;padding-top:13px}
.chat-row{display:flex;justify-content:space-between;align-items:center}
.chat-context{font-size:16px;color:var(--ink);font-weight:950}
.topic-controls{display:flex;align-items:center;gap:7px}

.topic-button .icon{width:15px;height:15px;color:var(--jade);flex:none}
.messages{position:absolute;left:0;right:0;top:74px;bottom:74px;overflow:hidden}
.msg{max-width:306px;border-radius:14px;padding:11px 14px;margin-bottom:9px;font-size:15px;line-height:1.53}

.prompt-msg{display:flex;flex-direction:column;align-items:center;gap:9px;width:244px;border-radius:12px;padding:12px 13px;margin:8px auto 10px;font-size:12px;line-height:1.48;text-align:center;background:#f3faf6;border:1px solid #d4e8dd;color:#334940;box-shadow:0 8px 18px rgba(25,72,58,.04)}
.prompt-btn{height:30px;min-width:54px;border-radius:8px;display:grid;place-items:center;background:var(--jade);color:#fff;font-size:12px;font-weight:950}

.send{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--jade),#1f6754)}
.topic-list{display:grid;gap:9px;margin-top:6px}
.topic-item{height:72px;border-radius:13px;border:1px solid #dce9e1;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 13px}

.full-return{height:44px;display:flex;align-items:center;gap:8px;color:var(--jade);font-size:13px;font-weight:950}

</head>
